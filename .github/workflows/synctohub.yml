name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          SW_ML_38: ${{ secrets.HF_TOKEN }}
        run: git push --force https://KAKOOZAMICHAEL:$SW_ML_38@huggingface.co/spaces/KAKOOZAMICHAEL/LATENT-TB-SW-ML-38 main
